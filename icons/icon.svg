<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#6366f1"/>
      <stop offset="55%" stop-color="#4338ca"/>
      <stop offset="100%" stop-color="#16a34a"/>
    </linearGradient>
    <radialGradient id="glow" cx="28%" cy="18%" r="70%">
      <stop offset="0%" stop-color="#ffffff" stop-opacity="0.22"/>
      <stop offset="100%" stop-color="#ffffff" stop-opacity="0"/>
    </radialGradient>
    <linearGradient id="pageL" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#6366f1"/>
      <stop offset="100%" stop-color="#4338ca"/>
    </linearGradient>
    <linearGradient id="pageR" x1="1" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#22c55e"/>
      <stop offset="100%" stop-color="#15803d"/>
    </linearGradient>
  </defs>

  <rect width="512" height="512" rx="120" fill="url(#bg)"/>
  <rect width="512" height="512" rx="120" fill="url(#glow)"/>

  <!-- speech bubble -->
  <path d="M96 168 a56 56 0 0 1 56 -56 h208 a56 56 0 0 1 56 56 v140 a56 56 0 0 1 -56 56 h-140 l-64 58 v-58 h-4 a56 56 0 0 1 -56 -56 z" fill="#ffffff"/>

  <!-- open book -->
  <path d="M256 196 L162 172 v128 L256 324 Z" fill="url(#pageL)"/>
  <path d="M256 196 L350 172 v128 L256 324 Z" fill="url(#pageR)"/>
  <line x1="256" y1="196" x2="256" y2="324" stroke="#ffffff" stroke-width="5" opacity="0.85"/>
  <path d="M186 198 L232 210 M186 224 L232 234 M186 250 L232 258" stroke="#ffffff" stroke-width="5" stroke-linecap="round" opacity="0.85"/>
  <path d="M326 198 L280 210 M326 224 L280 234 M326 250 L280 258" stroke="#ffffff" stroke-width="5" stroke-linecap="round" opacity="0.85"/>

  <!-- mastery badge -->
  <circle cx="378" cy="146" r="30" fill="#facc15"/>
  <path d="M364 146 l10 10 l20 -22" fill="none" stroke="#7c5e00" stroke-width="7" stroke-linecap="round" stroke-linejoin="round"/>
</svg>
