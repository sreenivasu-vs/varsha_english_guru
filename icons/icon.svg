<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#22d3ee"/>
      <stop offset="50%" stop-color="#6366f1"/>
      <stop offset="100%" stop-color="#d946ef"/>
    </linearGradient>
    <radialGradient id="glow" cx="26%" cy="16%" r="72%">
      <stop offset="0%" stop-color="#ffffff" stop-opacity="0.28"/>
      <stop offset="100%" stop-color="#ffffff" stop-opacity="0"/>
    </radialGradient>
  </defs>

  <rect width="512" height="512" rx="118" fill="url(#bg)"/>
  <rect width="512" height="512" rx="118" fill="url(#glow)"/>

  <!-- graduation cap -->
  <polygon points="256,88 320,120 256,152 192,120" fill="#ffffff"/>
  <path d="M222,124 V154 C222,171 237,184 256,184 C275,184 290,171 290,154 V124 L256,140 Z" fill="#ffffff" opacity="0.94"/>
  <line x1="320" y1="120" x2="320" y2="162" stroke="#ffffff" stroke-width="7" stroke-linecap="round"/>
  <circle cx="320" cy="174" r="9" fill="#fbbf24"/>

  <!-- open book, doubling as a speech shape via the small tail -->
  <path d="M170,378 L146,414 L206,380 Z" fill="#ffffff"/>
  <path d="M256,270 C196,246 146,252 112,270 L112,380 C146,364 196,358 256,380 Z" fill="#ffffff"/>
  <path d="M256,270 C316,246 366,252 400,270 L400,380 C366,364 316,358 256,380 Z" fill="#ffffff" opacity="0.95"/>
  <line x1="256" y1="270" x2="256" y2="380" stroke="#c7cbe8" stroke-width="3"/>

  <!-- EM monogram -->
  <text x="161" y="358" font-family="Arial, Helvetica, sans-serif" font-size="64" font-weight="800" fill="#4338ca">E</text>
  <text x="298" y="358" font-family="Arial, Helvetica, sans-serif" font-size="64" font-weight="800" fill="#db2777">M</text>
</svg>
