<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#6366f1"/>
      <stop offset="100%" stop-color="#16a34a"/>
    </linearGradient>
    <linearGradient id="cap" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#ffffff"/>
      <stop offset="100%" stop-color="#e7e9f7"/>
    </linearGradient>
    <radialGradient id="glow" cx="30%" cy="20%" r="75%">
      <stop offset="0%" stop-color="#ffffff" stop-opacity="0.18"/>
      <stop offset="100%" stop-color="#ffffff" stop-opacity="0"/>
    </radialGradient>
  </defs>

  <rect width="512" height="512" rx="118" fill="url(#bg)"/>
  <rect width="512" height="512" rx="118" fill="url(#glow)"/>

  <!-- graduation cap: mortarboard -->
  <polygon points="256,142 412,204 256,266 100,204" fill="url(#cap)"/>
  <!-- head / base of cap -->
  <path d="M172 214 V262 C172 296 210 322 256 322 C302 322 340 296 340 262 V214 L256 248 Z" fill="#ffffff" opacity="0.95"/>
  <!-- tassel -->
  <line x1="412" y1="204" x2="412" y2="278" stroke="#ffffff" stroke-width="9" stroke-linecap="round"/>
  <circle cx="412" cy="292" r="12" fill="#facc15"/>

  <!-- speech bubble accent (speaking practice) -->
  <path d="M118 356 h96 a20 20 0 0 1 20 20 v34 a20 20 0 0 1 -20 20 h-46 l-26 24 v-24 h-24 a20 20 0 0 1 -20 -20 v-34 a20 20 0 0 1 20 -20 z" fill="#ffffff" opacity="0.95"/>
  <circle cx="146" cy="393" r="7" fill="#4f46e5"/>
  <circle cx="172" cy="393" r="7" fill="#4f46e5"/>
  <circle cx="198" cy="393" r="7" fill="#4f46e5"/>
</svg>
